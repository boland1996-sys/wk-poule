name: Auto-import WK uitslagen

# De automatische import draait via cron-job.org (elke minuut). Deze workflow staat
# alleen nog als handmatige reserve: GitHub-schema was onbetrouwbaar (afgeknepen tot
# ~1x/uur) en de geplande runs faalden bovendien op een verouderd CRON_SECRET.
# Met de hand te starten via de "Run workflow"-knop (vereist dan wel een geldig
# CRON_SECRET in de GitHub-secrets).
on:
  workflow_dispatch: {}

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger import endpoint
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.ramonboland.com/api/cron-import"
